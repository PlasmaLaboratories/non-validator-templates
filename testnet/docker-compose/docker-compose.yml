services:
  openssl-init:
    image: ${OPEN_SSL_IMAGE}:${OPEN_SSL_TAG}
    entrypoint: ["/bin/sh"]
    command: >
      -c "
        openssl rand -hex 32 | tr -d '\n' > /jwt/jwt.hex &&
        openssl ecparam -name secp256k1 -genkey -noout -out /consensus/ec-secp256k1-non-validator.pem &&
        openssl ec -in /consensus/ec-secp256k1-non-validator.pem -outform DER -no_public -out /consensus/ec-secp256k1-non-validator.der
      "
    env_file: .env
    container_name: openssl-init
    volumes:
      - consensus-data:/consensus:rw
      - jwt-secret:/jwt:rw

  init-consensus:
    image: ${PLASMA_CONSENSUS_IMAGE}:${PLASMA_CONSENSUS_TAG}
    user: "0:0"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        plasma-cli dump-genesis \
          --chain $NETWORK > /config/$NETWORK.json &&
        plasma-cli init \
          --chain /config/$NETWORK.json \
          --data-dir /consensus &&
        plasma-cli peer-id \
          --identity-file-path /consensus/ec-secp256k1-non-validator.der > /config/peer-id.txt
    env_file: .env
    volumes:
      - consensus-data:/consensus:rw
      - genesis:/config:rw
    depends_on:
      openssl-init:
        condition: service_completed_successfully

  init-execution:
    image: ${PLASMA_EXECUTION_IMAGE}:${PLASMA_EXECUTION_TAG}
    user: "0:0"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        reth init \
          --chain /config/$NETWORK.json \
          --datadir /execution \
          --log.file.directory /execution/log
    container_name: init-execution
    env_file: .env
    volumes:
      - execution-data:/execution:rw
      - genesis:/config:ro
      - jwt-secret:/jwt:ro
    depends_on:
      init-consensus:
        condition: service_completed_successfully

  execution:
    image: ${PLASMA_EXECUTION_IMAGE}:${PLASMA_EXECUTION_TAG}
    user: "0:0"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        reth node \
          --chain /config/$NETWORK.json \
          --datadir /execution \
          --trusted-peers "$(cat /tmp/enodes.txt)" \
          --authrpc.jwtsecret /jwt/jwt.hex \
          --authrpc.addr 0.0.0.0 \
          --authrpc.port 8551 \
          --http \
          --http.addr 0.0.0.0 \
          --http.api eth,net,web3,txpool,debug \
          --http.corsdomain '*' \
          -vvv \
          --color never \
          --rpc.gascap "36000000" \
          --txpool.gas-limit "36000000" \
          --txpool.blobpool-max-count "0" \
          --txpool.blobpool-max-size "0" \
          --txpool.blob-cache-size "0" \
          --log.file.directory /execution/log
    container_name: plasma-execution
    env_file: .env
    volumes:
      - execution-data:/execution:rw
      - jwt-secret:/jwt:ro
      - genesis:/config:ro
      - ./enodes.txt:/tmp/enodes.txt:ro
    depends_on:
      init-execution:
        condition: service_completed_successfully

  consensus:
    image: ${PLASMA_CONSENSUS_IMAGE}:${PLASMA_CONSENSUS_TAG}
    user: "0:0"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        plasma-cli observer \
          --config-path /tmp/non-validator.toml \
          --no-color \
          --disable-peer-scoring \
          --timeout-stream-manager 10ms \
          -vvv
    ports:
      - "34070:34070"   # p2p
    container_name: plasma-consensus
    env_file: .env
    volumes:
      - consensus-data:/consensus:rw
      - ./non-validator.toml:/tmp/non-validator.toml:ro
      - genesis:/config:ro
      - jwt-secret:/jwt:ro
      - ./node/identities:/node/identities:ro
      - ./node/keys:/node/keys:ro
    depends_on:
      init-consensus:
        condition: service_completed_successfully

volumes:
  consensus-data:
  execution-data:
  jwt-secret:
  genesis:

networks:
  plasma:
    driver: bridge
