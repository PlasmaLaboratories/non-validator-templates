global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'plasma-execution'
    static_configs:
      - targets: ['plasma-execution:9001']

  - job_name: 'plasma-consensus'
    static_configs:
      - targets: ['plasma-consensus:9001']
